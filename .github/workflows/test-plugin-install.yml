name: Test Plugin Installation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-skills:
    name: Validate skill content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate all skills
        run: node scripts/validate-skills.js

      - name: Run skill evals (trigger + routing)
        run: node scripts/run-evals.js

      - name: Run grill-with-docs session lifecycle checks
        run: node scripts/test-grill-with-docs-runtime.js

      - name: Run plan-review contract checks
        run: node scripts/test-plan-review-contracts.js

  validate-commands:
    name: Validate Claude command metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Claude commands
        run: node scripts/validate-commands.js

  validate-metadata:
    name: Validate plugin manifests and agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Claude and Codex metadata
        run: node scripts/validate-plugin-manifests.js

      - name: Validate Claude reviewer agents
        run: node scripts/validate-agents.js

  validate:
    name: Validate plugin structure
    needs: [validate-skills, validate-commands, validate-metadata]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace and plugin manifests
        run: claude plugin validate .

  test-install:
    name: Test plugin installation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git to use HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Add marketplace
        run: claude plugin marketplace add ./

      - name: List marketplaces
        run: claude plugin marketplace list

      - name: Install plugin
        run: claude plugin install oh-my-zz@oh-my-zz --scope user
